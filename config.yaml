# RAG hyperparameters (final selected config after full-corpus Phase D eval)
chunk_size: 768                # tokens; stable full-corpus production ingest
overlap_ratio: 0.10            # 10%; balanced overlap without extra ingest cost
top_k: 20                      # Phase D winner: better recall than k=5, less context than k=30
retrieval_fetch_k: 30          # over-fetch then dedupe (assignment cap is 30)
embed_content: "chunk_only"    # Phase A winner; final selected config

# Models (LLMod.AI proxy)
embed_model: "4UHRUIN-text-embedding-3-small"
embed_dim: 1536
chat_model: "4UHRUIN-gpt-5-mini"
reasoning_effort: "low"

# Pinecone
pinecone_index: "medium-rag"
pinecone_namespace: "prod"
